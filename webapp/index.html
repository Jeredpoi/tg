<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Скаут</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--tg-theme-bg-color, #1c1c1e);
    color: var(--tg-theme-text-color, #fff);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Tab bar ── */
  .tabs {
    display: flex;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--tg-theme-secondary-bg-color, #2c2c2e);
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }
  .tab-btn {
    flex: 1;
    padding: 14px 0;
    background: none;
    border: none;
    color: var(--tg-theme-hint-color, #8e8e93);
    font-size: 15px;
    font-weight: 500;
    cursor: pointer;
    transition: color .2s;
    border-bottom: 2px solid transparent;
  }
  .tab-btn.active {
    color: var(--tg-theme-button-color, #2481cc);
    border-bottom-color: var(--tg-theme-button-color, #2481cc);
  }

  /* ── Sections ── */
  .section { display: none; padding: 12px; }
  .section.active { display: block; }

  /* ── Sort bar ── */
  .sort-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    overflow-x: auto;
    padding-bottom: 4px;
    scrollbar-width: none;
  }
  .sort-bar::-webkit-scrollbar { display: none; }
  .sort-btn {
    white-space: nowrap;
    padding: 6px 14px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.15);
    background: none;
    color: var(--tg-theme-hint-color, #8e8e93);
    font-size: 13px;
    cursor: pointer;
    transition: all .2s;
  }
  .sort-btn.active {
    background: var(--tg-theme-button-color, #2481cc);
    border-color: var(--tg-theme-button-color, #2481cc);
    color: #fff;
  }

  /* ── Steam cards ── */
  .steam-card {
    display: flex;
    background: var(--tg-theme-secondary-bg-color, #2c2c2e);
    border-radius: 14px;
    margin-bottom: 10px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: transform .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .steam-card:active { transform: scale(0.98); }
  .steam-cover {
    width: 120px;
    min-width: 120px;
    height: 80px;
    object-fit: cover;
    background: #333;
  }
  .steam-cover-placeholder {
    width: 120px;
    min-width: 120px;
    height: 80px;
    background: linear-gradient(135deg, #1a3a5c, #0d2137);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 28px;
  }
  .steam-info {
    padding: 10px 12px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 1;
    min-width: 0;
  }
  .steam-name {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.3;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
  }
  .steam-price-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .steam-badge {
    background: #4caf50;
    color: #fff;
    font-size: 12px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 6px;
  }
  .steam-orig {
    font-size: 12px;
    color: var(--tg-theme-hint-color, #8e8e93);
    text-decoration: line-through;
  }
  .steam-sale {
    font-size: 14px;
    font-weight: 700;
    color: #4caf50;
  }

  /* ── Gallery grid ── */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }
  .photo-card {
    background: var(--tg-theme-secondary-bg-color, #2c2c2e);
    border-radius: 14px;
    overflow: hidden;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  .photo-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: #333;
    display: block;
  }
  .photo-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, #2c2c2e, #3a3a3c);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  .photo-meta {
    padding: 8px 10px;
  }
  .photo-author {
    font-size: 12px;
    color: var(--tg-theme-hint-color, #8e8e93);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  .photo-score {
    display: flex;
    align-items: center;
    gap: 4px;
    margin-top: 2px;
  }
  .score-num {
    font-size: 16px;
    font-weight: 700;
    color: #ffd60a;
  }
  .score-star { font-size: 14px; }
  .score-votes {
    font-size: 11px;
    color: var(--tg-theme-hint-color, #8e8e93);
    margin-left: 2px;
  }
  .rank-badge {
    position: absolute;
    top: 7px;
    left: 7px;
    background: rgba(0,0,0,0.65);
    color: #fff;
    font-size: 11px;
    font-weight: 700;
    padding: 2px 7px;
    border-radius: 20px;
    backdrop-filter: blur(4px);
  }
  .rank-1 { background: rgba(255, 214, 10, 0.85); color: #000; }
  .rank-2 { background: rgba(180, 180, 180, 0.85); color: #000; }
  .rank-3 { background: rgba(205, 127, 50, 0.85); color: #000; }

  /* ── Loader & empty ── */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 60px 20px;
    gap: 14px;
    color: var(--tg-theme-hint-color, #8e8e93);
  }
  .spinner {
    width: 32px; height: 32px;
    border: 3px solid rgba(255,255,255,0.1);
    border-top-color: var(--tg-theme-button-color, #2481cc);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    padding: 60px 20px;
    color: var(--tg-theme-hint-color, #8e8e93);
    font-size: 15px;
  }
  .empty-icon { font-size: 48px; margin-bottom: 12px; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('steam')">🎮 Steam</button>
  <button class="tab-btn"       onclick="switchTab('gallery')">📸 Галерея</button>
</div>

<!-- ── Steam ── -->
<div id="tab-steam" class="section active">
  <div class="sort-bar">
    <button class="sort-btn active" onclick="steamSort('discount', this)">🔥 По скидке</button>
    <button class="sort-btn"        onclick="steamSort('price', this)">💎 По цене</button>
  </div>
  <div id="steam-list"><div class="loader"><div class="spinner"></div><span>Загружаю скидки…</span></div></div>
</div>

<!-- ── Gallery ── -->
<div id="tab-gallery" class="section">
  <div id="gallery-grid"><div class="loader"><div class="spinner"></div><span>Загружаю галерею…</span></div></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.setHeaderColor('secondary_bg_color');

const chatId = tg.initDataUnsafe?.chat?.id || null;

let steamData = null;
let currentSort = 'discount';

// ── Tabs ──
function switchTab(name) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  event.currentTarget.classList.add('active');

  if (name === 'gallery') loadGallery();
  if (name === 'steam' && !steamData) loadSteam();
}

// ── Steam ──
async function loadSteam(sort = currentSort) {
  const list = document.getElementById('steam-list');
  if (!steamData) list.innerHTML = '<div class="loader"><div class="spinner"></div><span>Загружаю скидки…</span></div>';

  try {
    const r = await fetch(`/api/steam?sort=${sort}`);
    const data = await r.json();
    steamData = data.deals || [];
    renderSteam(steamData);
  } catch(e) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">😔</div>Не удалось загрузить скидки</div>';
  }
}

function steamSort(sort, btn) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');

  if (!steamData) { loadSteam(sort); return; }

  let sorted = [...steamData];
  if (sort === 'price')    sorted.sort((a, b) => a.final_price - b.final_price);
  if (sort === 'discount') sorted.sort((a, b) => b.discount - a.discount);
  renderSteam(sorted);
}

function fmtRub(kopecks) {
  if (!kopecks) return '?';
  return Math.floor(kopecks / 100).toLocaleString('ru') + '\u20BD';
}

function renderSteam(deals) {
  const list = document.getElementById('steam-list');
  if (!deals.length) {
    list.innerHTML = '<div class="empty"><div class="empty-icon">🎮</div>Скидок не найдено</div>';
    return;
  }
  list.innerHTML = deals.map(d => `
    <a class="steam-card" href="${d.url}" target="_blank">
      <img class="steam-cover" src="${d.cover}" alt=""
           onerror="this.outerHTML='<div class=\\'steam-cover-placeholder\\'>🎮</div>'">
      <div class="steam-info">
        <div class="steam-name">${escHtml(d.name)}</div>
        <div class="steam-price-row">
          <span class="steam-badge">-${d.discount}%</span>
          <span class="steam-orig">${fmtRub(d.original_price)}</span>
          <span class="steam-sale">${fmtRub(d.final_price)}</span>
        </div>
      </div>
    </a>
  `).join('');
}

// ── Gallery ──
let galleryLoaded = false;
async function loadGallery() {
  if (galleryLoaded) return;
  const grid = document.getElementById('gallery-grid');

  try {
    const r = await fetch('/api/gallery' + (chatId ? `?chat_id=${chatId}` : ''));
    const data = await r.json();
    const photos = data.photos || [];

    if (!photos.length) {
      grid.innerHTML = '<div class="empty"><div class="empty-icon">📸</div>Нет оценённых фото</div>';
      galleryLoaded = true;
      return;
    }

    grid.innerHTML = '<div class="gallery-grid">' + photos.map((p, i) => {
      const rank = i < 3
        ? `<div class="rank-badge rank-${i+1}">${['🥇','🥈','🥉'][i]}</div>`
        : `<div class="rank-badge">#${i+1}</div>`;
      return `
        <div class="photo-card">
          ${rank}
          <img class="photo-img" src="/api/photo/${p.key}" alt=""
               onerror="this.outerHTML='<div class=\\'photo-img-placeholder\\'>📷</div>'">
          <div class="photo-meta">
            <div class="photo-author">${escHtml(p.author)}</div>
            <div class="photo-score">
              <span class="score-star">⭐</span>
              <span class="score-num">${p.avg_score.toFixed(1)}</span>
              <span class="score-votes">${p.vote_count} гол.</span>
            </div>
          </div>
        </div>`;
    }).join('') + '</div>';
    galleryLoaded = true;
  } catch(e) {
    grid.innerHTML = '<div class="empty"><div class="empty-icon">😔</div>Не удалось загрузить галерею</div>';
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// Initial load
loadSteam();
</script>
</body>
</html>
