<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Скаут</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--tg-theme-bg-color, #0f0f10);
    color: var(--tg-theme-text-color, #f0f0f0);
    min-height: 100vh;
    overflow-x: hidden;
    max-width: 680px;
    margin: 0 auto;
  }

  /* ── Tab bar ── */
  .tabs {
    display: flex;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--tg-theme-secondary-bg-color, #1a1a1c);
    padding: 0 16px;
    gap: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .tab-btn {
    flex: 1;
    padding: 14px 0 12px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--tg-theme-hint-color, #6e6e73);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: color .2s, border-color .2s;
    letter-spacing: 0.01em;
  }
  .tab-btn.active {
    color: var(--tg-theme-button-color, #3a8ee6);
    border-bottom-color: var(--tg-theme-button-color, #3a8ee6);
  }

  /* ── Sections ── */
  .section { display: none; padding: 20px 16px; }
  .section.active { display: block; }

  /* ── Sort bar ── */
  .sort-bar {
    display: flex;
    gap: 8px;
    margin-bottom: 14px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .sort-bar::-webkit-scrollbar { display: none; }
  .sort-btn {
    white-space: nowrap;
    padding: 7px 16px;
    border-radius: 20px;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--tg-theme-hint-color, #6e6e73);
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .sort-btn.active {
    background: var(--tg-theme-button-color, #3a8ee6);
    border-color: transparent;
    color: #fff;
  }

  /* ── Gallery toolbar ── */
  .gallery-toolbar {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 14px;
  }
  .gallery-sort {
    flex: 1;
    margin-bottom: 0;
  }
  .refresh-btn {
    width: 36px; height: 36px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--tg-theme-hint-color, #6e6e73);
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: all .2s;
  }
  .refresh-btn:hover { border-color: var(--tg-theme-button-color, #3a8ee6); color: var(--tg-theme-button-color, #3a8ee6); }
  .refresh-btn.spinning { animation: spin .7s linear infinite; }

  /* ── Gallery grid ── */
  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;
  }
  @media (max-width: 480px) {
    .gallery-grid { grid-template-columns: 1fr 1fr; gap: 8px; }
  }
  .photo-card {
    background: var(--tg-theme-secondary-bg-color, #1a1a1c);
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    border: 1px solid rgba(255,255,255,0.05);
    animation: fadeUp .35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .photo-card:nth-child(1) { animation-delay: .00s; }
  .photo-card:nth-child(2) { animation-delay: .04s; }
  .photo-card:nth-child(3) { animation-delay: .08s; }
  .photo-card:nth-child(4) { animation-delay: .12s; }
  .photo-card:nth-child(5) { animation-delay: .16s; }
  .photo-card:nth-child(6) { animation-delay: .20s; }
  .photo-card:nth-child(n+7) { animation-delay: .24s; }

  /* Skeleton */
  .photo-card.skeleton { pointer-events: none; }
  .skeleton-img {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(90deg, #1e1e20 25%, #2a2a2e 50%, #1e1e20 75%);
    background-size: 200% 100%;
    animation: shimmer 1.4s infinite;
  }
  @keyframes shimmer {
    0%   { background-position: 200% 0; }
    100% { background-position: -200% 0; }
  }

  .photo-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: #1e1e20;
    display: block;
  }
  .photo-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.88) 0%, rgba(0,0,0,0) 100%);
    padding: 36px 8px 8px;
  }
  .photo-overlay-row {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 4px;
  }
  .photo-author-overlay {
    font-size: 11px;
    font-weight: 500;
    color: rgba(255,255,255,0.8);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    flex: 1;
    min-width: 0;
  }
  .photo-score-overlay {
    display: flex;
    align-items: center;
    gap: 3px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    padding: 3px 7px;
    border-radius: 10px;
    flex-shrink: 0;
  }
  .score-num { font-size: 12px; font-weight: 700; color: #ffd60a; }
  .score-votes { font-size: 10px; color: rgba(255,255,255,0.55); }
  .voting-badge {
    position: absolute;
    top: 8px; right: 8px;
    background: rgba(58,142,230,0.85);
    backdrop-filter: blur(4px);
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    padding: 3px 7px;
    border-radius: 8px;
    letter-spacing: 0.03em;
  }
  .photo-comments-badge {
    display: flex;
    align-items: center;
    gap: 3px;
    background: rgba(0,0,0,0.45);
    backdrop-filter: blur(6px);
    padding: 3px 7px;
    border-radius: 10px;
    flex-shrink: 0;
    font-size: 11px;
    color: rgba(255,255,255,0.7);
  }

  .photo-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, #1e1e20, #2a2a2d);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 36px;
  }
  .rank-badge {
    position: absolute;
    top: 8px; left: 8px;
    font-size: 16px;
    line-height: 1;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.7));
  }
  .rank-badge.rank-num {
    font-size: 11px;
    font-weight: 700;
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.85);
    padding: 2px 7px;
    border-radius: 10px;
    backdrop-filter: blur(4px);
  }
  .video-badge {
    position: absolute;
    top: 8px; right: 8px;
    font-size: 16px;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.8));
  }

  /* ── Modal ── */
  .modal-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.85);
    z-index: 200;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }
  .modal-overlay.open { display: flex; flex-direction: column; }
  .modal {
    background: var(--tg-theme-secondary-bg-color, #1a1a1c);
    border-radius: 20px 20px 0 0;
    margin-top: auto;
    width: 100%;
    max-width: 680px;
    margin-left: auto;
    margin-right: auto;
    overflow: hidden;
    animation: slideUp .25s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(40px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }
  .modal-media {
    width: 100%;
    max-height: 55vh;
    object-fit: contain;
    background: #000;
    display: block;
  }
  .modal-media-wrap { position: relative; }
  .modal-nav {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    background: rgba(0,0,0,0.55);
    border: none;
    color: #fff;
    font-size: 20px;
    width: 38px; height: 38px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
    z-index: 10;
    transition: opacity .15s;
    -webkit-tap-highlight-color: transparent;
  }
  .modal-nav:disabled { opacity: 0; pointer-events: none; }
  .modal-nav-prev { left: 10px; }
  .modal-nav-next { right: 10px; }
  .modal-counter {
    position: absolute;
    bottom: 10px;
    left: 50%;
    transform: translateX(-50%);
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(4px);
    color: rgba(255,255,255,0.7);
    font-size: 12px;
    padding: 3px 10px;
    border-radius: 10px;
    pointer-events: none;
  }
  .modal-info {
    padding: 14px 16px 10px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    gap: 10px;
  }
  .modal-info-left { display: flex; flex-direction: column; gap: 2px; min-width: 0; }
  .modal-author { font-size: 14px; font-weight: 600; }
  .modal-score  { font-size: 13px; color: #ffd60a; font-weight: 700; }
  .modal-close {
    position: absolute;
    top: 14px; right: 14px;
    background: rgba(0,0,0,0.6);
    border: none;
    color: #fff;
    font-size: 18px;
    width: 34px; height: 34px;
    border-radius: 50%;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(4px);
  }
  .comments-section { padding: 14px 16px; }
  .comments-title {
    font-size: 13px;
    font-weight: 600;
    color: var(--tg-theme-hint-color, #6e6e73);
    text-transform: uppercase;
    letter-spacing: 0.06em;
    margin-bottom: 12px;
  }
  .comments-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
  .comment-item { display: flex; gap: 10px; }
  .comment-avatar {
    width: 32px; height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--tg-theme-button-color, #3a8ee6), #1a56a0);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; font-weight: 700; color: #fff;
    flex-shrink: 0;
    overflow: hidden;
  }
  .comment-avatar img {
    width: 100%; height: 100%;
    object-fit: cover;
    border-radius: 50%;
  }
  .comment-body { flex: 1; min-width: 0; }
  .comment-header { display: flex; align-items: baseline; gap: 8px; margin-bottom: 2px; }
  .comment-name { font-size: 13px; font-weight: 600; }
  .comment-time { font-size: 11px; color: var(--tg-theme-hint-color, #6e6e73); }
  .comment-text { font-size: 14px; line-height: 1.45; word-break: break-word; }
  .comments-empty {
    font-size: 14px;
    color: var(--tg-theme-hint-color, #6e6e73);
    margin-bottom: 16px;
    text-align: center;
    padding: 8px 0;
  }
  .comment-form { display: flex; gap: 10px; align-items: flex-end; }
  .comment-input {
    flex: 1;
    padding: 10px 14px;
    border-radius: 14px;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.06);
    color: var(--tg-theme-text-color, #f0f0f0);
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 100px;
    transition: border-color .2s;
  }
  .comment-input::placeholder { color: var(--tg-theme-hint-color, #6e6e73); }
  .comment-input:focus { border-color: var(--tg-theme-button-color, #3a8ee6); }
  .comment-send {
    width: 42px; height: 42px;
    border-radius: 50%;
    background: var(--tg-theme-button-color, #3a8ee6);
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: opacity .15s;
  }
  .comment-send:disabled { opacity: .4; cursor: default; }

  /* ── Auth banner ── */
  .auth-banner {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 0 14px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
    margin-bottom: 14px;
    min-height: 36px;
  }
  .auth-info { font-size: 13px; color: var(--tg-theme-hint-color, #6e6e73); flex: 1; min-width: 0; }
  .auth-name { font-weight: 600; color: var(--tg-theme-text-color, #f0f0f0); }
  .logout-btn {
    background: none;
    border: 1px solid rgba(255,255,255,0.15);
    color: var(--tg-theme-hint-color, #6e6e73);
    font-size: 12px;
    padding: 5px 12px;
    border-radius: 10px;
    cursor: pointer;
    flex-shrink: 0;
  }

  /* ── Loader & empty ── */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 70px 20px;
    gap: 14px;
    color: var(--tg-theme-hint-color, #6e6e73);
    font-size: 14px;
  }
  .spinner {
    width: 30px; height: 30px;
    border: 2.5px solid rgba(255,255,255,0.08);
    border-top-color: var(--tg-theme-button-color, #3a8ee6);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  .empty {
    text-align: center;
    padding: 70px 20px;
    color: var(--tg-theme-hint-color, #6e6e73);
    font-size: 15px;
    line-height: 1.5;
  }
  .empty-icon { font-size: 48px; margin-bottom: 14px; display: block; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn active" id="tab-btn-gallery" onclick="switchTab('gallery', this)">📸 Галерея</button>
</div>

<!-- ── Gallery ── -->
<div id="tab-gallery" class="section">
  <div class="gallery-toolbar">
    <div class="sort-bar gallery-sort">
      <button class="sort-btn active" id="gsort-score" onclick="gallerySort('score', this)">⭐ Рейтинг</button>
      <button class="sort-btn" id="gsort-votes" onclick="gallerySort('votes', this)">🗳 Голоса</button>
      <button class="sort-btn" id="gsort-date"  onclick="gallerySort('date',  this)">🆕 Новые</button>
    </div>
    <button class="refresh-btn" id="gallery-refresh" onclick="refreshGallery()" title="Обновить">↻</button>
  </div>
  <div id="gallery-grid"><div class="loader"><div class="spinner"></div><span>Загружаю галерею…</span></div></div>
</div>

<!-- ── Photo modal ── -->
<div class="modal-overlay" id="modal-overlay" onclick="onOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-media-wrap" id="modal-media-wrap-outer">
      <div id="modal-media-wrap"></div>
      <button class="modal-nav modal-nav-prev" id="modal-prev" onclick="prevPhoto()">‹</button>
      <button class="modal-nav modal-nav-next" id="modal-next" onclick="nextPhoto()">›</button>
      <div class="modal-counter" id="modal-counter"></div>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="modal-info">
      <div class="modal-info-left">
        <span class="modal-author" id="modal-author"></span>
        <span class="modal-score"  id="modal-score"></span>
      </div>
    </div>
    <div class="comments-section">
      <div class="comments-title">Комментарии</div>
      <div class="auth-banner" id="auth-banner">
        <span class="auth-info" id="auth-info-text">…</span>
        <div id="login-widget-container"></div>
        <button class="logout-btn" id="logout-btn" onclick="logoutTg()" style="display:none">Выйти</button>
      </div>
      <div class="comments-list" id="comments-list"></div>
      <div class="comment-form">
        <textarea class="comment-input" id="comment-input" rows="1"
                  placeholder="Написать комментарий…"
                  oninput="autoResize(this)"></textarea>
        <button class="comment-send" id="comment-send" onclick="submitComment()">➤</button>
      </div>
    </div>
  </div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.setHeaderColor('secondary_bg_color');

const _urlParams = new URLSearchParams(location.search);
const chatId = tg.initDataUnsafe?.chat?.id
            || (_urlParams.get('chat_id') ? parseInt(_urlParams.get('chat_id')) : null);

let galleryLoaded = false;
let gallerySort_  = 'score';
let photosData    = [];
let currentPhotoIndex = 0;

// ── Сохранение и восстановление вкладки ──
const STORAGE_KEY = 'scout_active_tab';

function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  try { localStorage.setItem(STORAGE_KEY, name); } catch(e) {}
  if (name === 'gallery') loadGallery();
}

function restoreTab() {
  switchTab('gallery', document.getElementById('tab-btn-gallery'));
}

// ── Gallery ──
function gallerySort(sort, btn) {
  gallerySort_ = sort;
  document.querySelectorAll('.gallery-sort .sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  galleryLoaded = false;
  loadGallery();
}

function refreshGallery() {
  const btn = document.getElementById('gallery-refresh');
  btn.classList.add('spinning');
  galleryLoaded = false;
  loadGallery().finally(() => btn.classList.remove('spinning'));
}

function showGallerySkeleton() {
  const grid = document.getElementById('gallery-grid');
  grid.innerHTML = '<div class="gallery-grid">' +
    Array(6).fill('<div class="photo-card skeleton"><div class="skeleton-img"></div></div>').join('') +
    '</div>';
}

async function loadGallery() {
  if (galleryLoaded) return;
  showGallerySkeleton();
  const grid = document.getElementById('gallery-grid');
  try {
    const params = new URLSearchParams({ sort: gallerySort_ });
    if (chatId) params.set('chat_id', chatId);
    const r = await fetch('/api/gallery?' + params);
    const data = await r.json();
    const photos = data.photos || [];
    photosData = photos;

    if (!photos.length) {
      grid.innerHTML = '<div class="empty"><span class="empty-icon">📸</span>Нет оценённых фото или видео</div>';
      galleryLoaded = true;
      return;
    }

    const MEDALS = ['🥇','🥈','🥉'];
    grid.innerHTML = '<div class="gallery-grid">' + photos.map((p, i) => {
      const isVideo = p.media_type === 'video';
      const rankEl = i < 3
        ? `<div class="rank-badge">${MEDALS[i]}</div>`
        : `<div class="rank-badge rank-num">#${i+1}</div>`;
      const videoBadge = isVideo ? `<div class="video-badge">🎥</div>` : '';
      const isVoting = !p.closed && p.created_at
        && (Date.now() - new Date(p.created_at.replace(' ','T') + 'Z').getTime() < 30 * 60 * 1000);
      const votingBadge = isVoting ? `<div class="voting-badge">🗳 Голосование</div>` : '';
      const media = isVideo
        ? `<video class="photo-img" src="/api/photo/${p.key}" muted playsinline loop preload="metadata"
                  onerror="this.outerHTML='<div class=\\'photo-img-placeholder\\'>🎥</div>'"
                  ontouchstart="this.play()" onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0"></video>`
        : `<img class="photo-img" src="/api/photo/${p.key}" alt=""
                onerror="this.outerHTML='<div class=\\'photo-img-placeholder\\'>📷</div>'">`;
      const commentsEl = p.comment_count > 0
        ? `<span class="photo-comments-badge">💬 ${p.comment_count}</span>`
        : '';
      return `
        <div class="photo-card" onclick="openModal(${i})" style="cursor:pointer">
          ${rankEl}${videoBadge}${votingBadge}${media}
          <div class="photo-overlay">
            <div class="photo-overlay-row">
              <span class="photo-author-overlay">${escHtml(p.author)}</span>
              ${p.vote_count > 0
                ? `<span class="photo-score-overlay">⭐ <span class="score-num">${p.avg_score.toFixed(1)}</span><span class="score-votes"> (${p.vote_count})</span></span>`
                : `<span class="photo-score-overlay"><span class="score-votes">нет голосов</span></span>`
              }
              ${commentsEl}
            </div>
          </div>
        </div>`;
    }).join('') + '</div>';
    galleryLoaded = true;
  } catch(e) {
    grid.innerHTML = '<div class="empty"><span class="empty-icon">😔</span>Не удалось загрузить галерею</div>';
  }
}

// ── Modal ──
let modalKey = null;

// ── Auth ──
let myName     = 'Аноним';
let myId       = 0;
let myAuthData = null;   // данные Telegram Login Widget (с hash для верификации)

function _showAuthBanner(loggedIn) {
  const info      = document.getElementById('auth-info-text');
  const container = document.getElementById('login-widget-container');
  const logoutBtn = document.getElementById('logout-btn');
  if (loggedIn) {
    info.innerHTML = `Вы: <span class="auth-name">${escHtml(myName)}</span>`;
    container.innerHTML = '';
    container.style.display = 'none';
    logoutBtn.style.display = '';
  } else {
    info.textContent = 'Войдите чтобы комментировать от своего имени';
    container.style.display = '';
    logoutBtn.style.display = 'none';
  }
}

async function _loadWidget() {
  try {
    const r = await fetch('/api/config');
    const data = await r.json();
    if (!data.bot_username) {
      document.getElementById('auth-info-text').textContent = 'Аноним';
      return;
    }
    const container = document.getElementById('login-widget-container');
    const s = document.createElement('script');
    s.src = 'https://telegram.org/js/telegram-widget.js?22';
    s.setAttribute('data-telegram-login', data.bot_username);
    s.setAttribute('data-size', 'small');
    s.setAttribute('data-onauth', 'onTelegramAuth(user)');
    s.setAttribute('data-request-access', 'write');
    s.async = true;
    container.appendChild(s);
  } catch(e) {
    document.getElementById('auth-info-text').textContent = 'Аноним';
  }
}

function onTelegramAuth(user) {
  try { localStorage.setItem('tg_auth', JSON.stringify(user)); } catch(e) {}
  myId       = user.id;
  myName     = user.username ? '@' + user.username : user.first_name;
  myAuthData = user;
  _showAuthBanner(true);
}

function logoutTg() {
  try { localStorage.removeItem('tg_auth'); } catch(e) {}
  try { localStorage.removeItem('tg_url_auth'); } catch(e) {}
  myName = 'Аноним'; myId = 0; myAuthData = null;
  _showAuthBanner(false);
  _loadWidget();
}

function initAuth() {
  // 1. Telegram WebApp (открыто через web_app= кнопку в личке)
  const tgUser = tg.initDataUnsafe?.user;
  if (tgUser) {
    myId   = tgUser.id;
    myName = tgUser.username ? '@' + tgUser.username : tgUser.first_name;
    _showAuthBanner(true);
    return;
  }
  // 2. URL-параметры от бота (?uid=...&uname=...) — сохраняем на 30 дней
  const urlUid   = _urlParams.get('uid');
  const urlUname = _urlParams.get('uname');
  if (urlUid && urlUname) {
    myId   = parseInt(urlUid);
    myName = urlUname.startsWith('@') ? urlUname : '@' + urlUname;
    try { localStorage.setItem('tg_url_auth', JSON.stringify({id: myId, name: myName, ts: Date.now()})); } catch(e) {}
    _showAuthBanner(true);
    return;
  }
  // 3. Сохранённая идентификация из прошлого перехода по ссылке
  try {
    const saved = localStorage.getItem('tg_url_auth');
    if (saved) {
      const auth = JSON.parse(saved);
      if (Date.now() - auth.ts < 30 * 24 * 3600 * 1000) {
        myId   = auth.id;
        myName = auth.name;
        _showAuthBanner(true);
        return;
      }
      localStorage.removeItem('tg_url_auth');
    }
  } catch(e) {}
  // 4. Сохранённая авторизация через виджет
  try {
    const saved = localStorage.getItem('tg_auth');
    if (saved) {
      const auth = JSON.parse(saved);
      if (Date.now() / 1000 - auth.auth_date < 7 * 86400) {
        myId       = auth.id;
        myName     = auth.username ? '@' + auth.username : auth.first_name;
        myAuthData = auth;
        _showAuthBanner(true);
        return;
      }
      localStorage.removeItem('tg_auth');
    }
  } catch(e) {}
  // 5. Показываем виджет
  _showAuthBanner(false);
  _loadWidget();
}

function openModal(index) {
  const p = photosData[index];
  if (!p) return;
  currentPhotoIndex = index;
  modalKey = p.key;

  document.getElementById('modal-author').textContent = p.author;
  document.getElementById('modal-score').textContent  = p.vote_count > 0
    ? `⭐ ${p.avg_score.toFixed(1)} · ${p.vote_count} гол.`
    : (p.closed ? 'Голосов нет' : '🗳 Голосование идёт...');

  const counter = document.getElementById('modal-counter');
  counter.textContent = photosData.length > 1 ? `${index + 1} / ${photosData.length}` : '';

  const prevBtn = document.getElementById('modal-prev');
  const nextBtn = document.getElementById('modal-next');
  prevBtn.disabled = index === 0;
  nextBtn.disabled = index === photosData.length - 1;

  const wrap = document.getElementById('modal-media-wrap');
  const isVideo = p.media_type === 'video';
  if (isVideo) {
    wrap.innerHTML = `<video class="modal-media" src="/api/photo/${p.key}" controls autoplay playsinline loop></video>`;
  } else {
    wrap.innerHTML = `<img class="modal-media" src="/api/photo/${p.key}" alt="">`;
  }

  document.getElementById('comment-input').value = '';
  document.getElementById('modal-overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
  loadComments(p.key);
}

function prevPhoto() {
  if (currentPhotoIndex > 0) openModal(currentPhotoIndex - 1);
}
function nextPhoto() {
  if (currentPhotoIndex < photosData.length - 1) openModal(currentPhotoIndex + 1);
}

function closeModal() {
  document.getElementById('modal-overlay').classList.remove('open');
  document.body.style.overflow = '';
  document.getElementById('modal-media-wrap').innerHTML = '';
  modalKey = null;
}

function onOverlayClick(e) {
  if (e.target === document.getElementById('modal-overlay')) closeModal();
}

// Свайп в модале
let _swipeX = null;
document.addEventListener('touchstart', e => {
  if (!document.getElementById('modal-overlay').classList.contains('open')) return;
  _swipeX = e.touches[0].clientX;
}, { passive: true });
document.addEventListener('touchend', e => {
  if (_swipeX === null || !document.getElementById('modal-overlay').classList.contains('open')) return;
  const dx = e.changedTouches[0].clientX - _swipeX;
  _swipeX = null;
  if (Math.abs(dx) < 50) return;
  if (dx < 0) nextPhoto(); else prevPhoto();
}, { passive: true });

async function loadComments(key) {
  const list = document.getElementById('comments-list');
  list.innerHTML = '<div style="color:var(--tg-theme-hint-color,#6e6e73);font-size:13px">Загружаю…</div>';
  try {
    const r = await fetch(`/api/comments/${key}`);
    const data = await r.json();
    renderComments(data.comments || []);
  } catch(e) {
    list.innerHTML = '<div style="color:var(--tg-theme-hint-color,#6e6e73);font-size:13px">Не удалось загрузить</div>';
  }
}

function renderComments(comments) {
  const list = document.getElementById('comments-list');
  if (!comments.length) {
    list.innerHTML = '<div class="comments-empty">Комментариев пока нет. Будь первым!</div>';
    return;
  }
  list.innerHTML = comments.map(c => {
    const initial = (c.commenter_name || '?')[0].toUpperCase();
    const time = formatTime(c.created_at);
    const avatarContent = c.commenter_id
      ? `<img src="/api/avatar/${c.commenter_id}" alt="${escHtml(initial)}"
              onerror="this.outerHTML='${escHtml(initial)}'">`
      : escHtml(initial);
    return `
      <div class="comment-item">
        <div class="comment-avatar">${avatarContent}</div>
        <div class="comment-body">
          <div class="comment-header">
            <span class="comment-name">${escHtml(c.commenter_name)}</span>
            <span class="comment-time">${time}</span>
          </div>
          <div class="comment-text">${escHtml(c.text)}</div>
        </div>
      </div>`;
  }).join('');
}

function formatTime(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr.replace(' ', 'T') + 'Z');
  const now = new Date();
  const diff = Math.floor((now - d) / 1000);
  if (diff < 60)   return 'только что';
  if (diff < 3600) return `${Math.floor(diff/60)} мин. назад`;
  if (diff < 86400) return `${Math.floor(diff/3600)} ч. назад`;
  return d.toLocaleDateString('ru', {day:'numeric', month:'short'});
}

async function submitComment() {
  const input = document.getElementById('comment-input');
  const btn   = document.getElementById('comment-send');
  const text  = input.value.trim();
  if (!text || !modalKey) return;

  btn.disabled = true;
  try {
    await fetch(`/api/comments/${modalKey}`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ text, commenter_name: myName, commenter_id: myId, tg_auth: myAuthData }),
    });
    input.value = '';
    input.style.height = '';
    await loadComments(modalKey);
    // Скролл вниз к комментариям
    document.getElementById('comments-list').lastElementChild?.scrollIntoView({behavior:'smooth'});
  } catch(e) {}
  btn.disabled = false;
}

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 100) + 'px';
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

restoreTab();
initAuth();
</script>
