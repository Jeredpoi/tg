<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Скаут</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--tg-theme-bg-color, #0f0f10);
    color: var(--tg-theme-text-color, #f0f0f0);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── Tab bar ── */
  .tabs {
    display: flex;
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--tg-theme-secondary-bg-color, #1a1a1c);
    padding: 0 16px;
    gap: 4px;
    border-bottom: 1px solid rgba(255,255,255,0.06);
  }
  .tab-btn {
    flex: 1;
    padding: 14px 0 12px;
    background: none;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--tg-theme-hint-color, #6e6e73);
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: color .2s, border-color .2s;
    letter-spacing: 0.01em;
  }
  .tab-btn.active {
    color: var(--tg-theme-button-color, #3a8ee6);
    border-bottom-color: var(--tg-theme-button-color, #3a8ee6);
  }

  /* ── Sections ── */
  .section { display: none; padding: 20px 16px; }
  .section.active { display: block; }

  /* ── Sort bar ── */
  .sort-bar {
    display: flex;
    gap: 10px;
    margin-bottom: 20px;
    overflow-x: auto;
    padding-bottom: 2px;
    scrollbar-width: none;
  }
  .sort-bar::-webkit-scrollbar { display: none; }
  .sort-btn {
    white-space: nowrap;
    padding: 9px 20px;
    border-radius: 22px;
    border: 1.5px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.04);
    color: var(--tg-theme-hint-color, #6e6e73);
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s;
  }
  .sort-btn.active {
    background: var(--tg-theme-button-color, #3a8ee6);
    border-color: transparent;
    color: #fff;
  }

  /* ── Steam cards ── */
  .steam-list { display: flex; flex-direction: column; gap: 14px; }
  .steam-card {
    display: flex;
    background: var(--tg-theme-secondary-bg-color, #1a1a1c);
    border-radius: 18px;
    overflow: hidden;
    text-decoration: none;
    color: inherit;
    transition: transform .15s, box-shadow .15s;
    -webkit-tap-highlight-color: transparent;
    border: 1px solid rgba(255,255,255,0.05);
  }
  .steam-card:active { transform: scale(0.975); }
  .steam-cover {
    width: 130px;
    min-width: 130px;
    height: 90px;
    object-fit: cover;
    background: #222;
  }
  .steam-cover-placeholder {
    width: 130px;
    min-width: 130px;
    height: 90px;
    background: linear-gradient(135deg, #1a2f4a, #0d1f30);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 30px;
  }
  .steam-info {
    padding: 14px 16px;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    flex: 1;
    min-width: 0;
  }
  .steam-name {
    font-size: 14px;
    font-weight: 600;
    line-height: 1.4;
    overflow: hidden;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    color: var(--tg-theme-text-color, #f0f0f0);
  }
  .steam-price-row {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
    margin-top: 8px;
  }
  .steam-badge {
    background: linear-gradient(135deg, #2ecc71, #27ae60);
    color: #fff;
    font-size: 12px;
    font-weight: 800;
    padding: 3px 10px;
    border-radius: 8px;
    letter-spacing: 0.02em;
  }
  .steam-badge.hot { background: linear-gradient(135deg, #ff6b35, #e84118); }
  .steam-orig {
    font-size: 12px;
    color: var(--tg-theme-hint-color, #6e6e73);
    text-decoration: line-through;
  }
  .steam-sale {
    font-size: 15px;
    font-weight: 700;
    color: #4cd964;
  }

  /* ── Gallery grid ── */
  .gallery-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 14px;
  }
  .photo-card {
    background: var(--tg-theme-secondary-bg-color, #1a1a1c);
    border-radius: 18px;
    overflow: hidden;
    position: relative;
    -webkit-tap-highlight-color: transparent;
    border: 1px solid rgba(255,255,255,0.05);
    animation: fadeUp .35s ease both;
  }
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  .photo-card:nth-child(1) { animation-delay: .00s; }
  .photo-card:nth-child(2) { animation-delay: .04s; }
  .photo-card:nth-child(3) { animation-delay: .08s; }
  .photo-card:nth-child(4) { animation-delay: .12s; }
  .photo-card:nth-child(5) { animation-delay: .16s; }
  .photo-card:nth-child(6) { animation-delay: .20s; }
  .photo-card:nth-child(n+7) { animation-delay: .24s; }

  .photo-img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    background: #1e1e20;
    display: block;
  }

  /* Score overlay на фото */
  .photo-overlay {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
    padding: 36px 12px 12px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
  }
  .photo-author-overlay {
    font-size: 12px;
    font-weight: 500;
    color: rgba(255,255,255,0.8);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
    max-width: 62%;
  }
  .photo-score-overlay {
    display: flex;
    align-items: center;
    gap: 4px;
    background: rgba(0,0,0,0.5);
    backdrop-filter: blur(6px);
    padding: 4px 9px;
    border-radius: 12px;
    flex-shrink: 0;
  }
  .score-num {
    font-size: 14px;
    font-weight: 700;
    color: #ffd60a;
  }
  .score-votes {
    font-size: 11px;
    color: rgba(255,255,255,0.55);
  }

  .photo-img-placeholder {
    width: 100%;
    aspect-ratio: 1;
    background: linear-gradient(135deg, #1e1e20, #2a2a2d);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 40px;
  }

  /* Rank badge */
  .rank-badge {
    position: absolute;
    top: 10px;
    left: 10px;
    font-size: 18px;
    line-height: 1;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.7));
  }
  .rank-badge.rank-num {
    font-size: 12px;
    font-weight: 700;
    background: rgba(0,0,0,0.55);
    color: rgba(255,255,255,0.85);
    padding: 3px 9px;
    border-radius: 12px;
    backdrop-filter: blur(4px);
  }

  /* Видео-бейдж */
  .video-badge {
    position: absolute;
    top: 10px;
    right: 10px;
    font-size: 18px;
    filter: drop-shadow(0 1px 4px rgba(0,0,0,0.8));
  }

  /* ── Loader & empty ── */
  .loader {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 70px 20px;
    gap: 14px;
    color: var(--tg-theme-hint-color, #6e6e73);
    font-size: 14px;
  }
  .spinner {
    width: 30px; height: 30px;
    border: 2.5px solid rgba(255,255,255,0.08);
    border-top-color: var(--tg-theme-button-color, #3a8ee6);
    border-radius: 50%;
    animation: spin .7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .empty {
    text-align: center;
    padding: 70px 20px;
    color: var(--tg-theme-hint-color, #6e6e73);
    font-size: 15px;
    line-height: 1.5;
  }
  .empty-icon { font-size: 48px; margin-bottom: 14px; display: block; }
</style>
</head>
<body>

<div class="tabs">
  <button class="tab-btn active" onclick="switchTab('steam', this)">🎮 Steam</button>
  <button class="tab-btn"       onclick="switchTab('gallery', this)">📸 Галерея</button>
</div>

<!-- ── Steam ── -->
<div id="tab-steam" class="section active">
  <div class="sort-bar">
    <button class="sort-btn active" onclick="steamSort('discount', this)">🔥 По скидке</button>
    <button class="sort-btn"        onclick="steamSort('price', this)">💎 По цене</button>
  </div>
  <div id="steam-list"><div class="loader"><div class="spinner"></div><span>Загружаю скидки…</span></div></div>
</div>

<!-- ── Gallery ── -->
<div id="tab-gallery" class="section">
  <div id="gallery-grid"><div class="loader"><div class="spinner"></div><span>Загружаю галерею…</span></div></div>
</div>

<script>
const tg = window.Telegram.WebApp;
tg.expand();
tg.setHeaderColor('secondary_bg_color');

const chatId = tg.initDataUnsafe?.chat?.id || null;

let steamData = null;
let currentSort = 'discount';
let galleryLoaded = false;

// ── Tabs ──
function switchTab(name, btn) {
  document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('tab-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'gallery') loadGallery();
}

// ── Steam ──
async function loadSteam(sort = currentSort) {
  const list = document.getElementById('steam-list');
  if (!steamData) list.innerHTML = '<div class="loader"><div class="spinner"></div><span>Загружаю скидки…</span></div>';
  try {
    const r = await fetch(`/api/steam?sort=${sort}`);
    const data = await r.json();
    steamData = data.deals || [];
    renderSteam(steamData);
  } catch(e) {
    list.innerHTML = '<div class="empty"><span class="empty-icon">😔</span>Не удалось загрузить скидки</div>';
  }
}

function steamSort(sort, btn) {
  currentSort = sort;
  document.querySelectorAll('.sort-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  if (!steamData) { loadSteam(sort); return; }
  let sorted = [...steamData];
  if (sort === 'price')    sorted.sort((a, b) => a.final_price - b.final_price);
  if (sort === 'discount') sorted.sort((a, b) => b.discount - a.discount);
  renderSteam(sorted);
}

function fmtRub(kopecks) {
  if (!kopecks) return '?';
  return Math.floor(kopecks / 100).toLocaleString('ru') + '\u20BD';
}

function renderSteam(deals) {
  const list = document.getElementById('steam-list');
  if (!deals.length) {
    list.innerHTML = '<div class="empty"><span class="empty-icon">🎮</span>Скидок не найдено</div>';
    return;
  }
  list.innerHTML = '<div class="steam-list">' + deals.map(d => {
    const isHot = d.discount >= 70;
    return `
    <a class="steam-card" href="${d.url}" target="_blank">
      <img class="steam-cover" src="${d.cover}" alt=""
           onerror="this.outerHTML='<div class=\\'steam-cover-placeholder\\'>🎮</div>'">
      <div class="steam-info">
        <div class="steam-name">${escHtml(d.name)}</div>
        <div class="steam-price-row">
          <span class="steam-badge${isHot ? ' hot' : ''}">-${d.discount}%</span>
          <span class="steam-orig">${fmtRub(d.original_price)}</span>
          <span class="steam-sale">${fmtRub(d.final_price)}</span>
        </div>
      </div>
    </a>`;
  }).join('') + '</div>';
}

// ── Gallery ──
async function loadGallery() {
  if (galleryLoaded) return;
  const grid = document.getElementById('gallery-grid');
  try {
    const r = await fetch('/api/gallery' + (chatId ? `?chat_id=${chatId}` : ''));
    const data = await r.json();
    const photos = data.photos || [];

    if (!photos.length) {
      grid.innerHTML = '<div class="empty"><span class="empty-icon">📸</span>Нет оценённых фото или видео</div>';
      galleryLoaded = true;
      return;
    }

    const MEDALS = ['🥇','🥈','🥉'];
    grid.innerHTML = '<div class="gallery-grid">' + photos.map((p, i) => {
      const isVideo = p.media_type === 'video';

      const rankEl = i < 3
        ? `<div class="rank-badge">${MEDALS[i]}</div>`
        : `<div class="rank-badge rank-num">#${i+1}</div>`;

      const videoBadge = isVideo ? `<div class="video-badge">🎥</div>` : '';

      const media = isVideo
        ? `<video class="photo-img" src="/api/photo/${p.key}" muted playsinline loop preload="metadata"
                  onerror="this.outerHTML='<div class=\\'photo-img-placeholder\\'>🎥</div>'"
                  ontouchstart="this.play()" onmouseenter="this.play()" onmouseleave="this.pause();this.currentTime=0"></video>`
        : `<img class="photo-img" src="/api/photo/${p.key}" alt=""
                onerror="this.outerHTML='<div class=\\'photo-img-placeholder\\'>📷</div>'">`;

      return `
        <div class="photo-card">
          ${rankEl}
          ${videoBadge}
          ${media}
          <div class="photo-overlay">
            <span class="photo-author-overlay">${escHtml(p.author)}</span>
            <span class="photo-score-overlay">
              ⭐ <span class="score-num">${p.avg_score.toFixed(1)}</span>
              <span class="score-votes">(${p.vote_count})</span>
            </span>
          </div>
        </div>`;
    }).join('') + '</div>';
    galleryLoaded = true;
  } catch(e) {
    grid.innerHTML = '<div class="empty"><span class="empty-icon">😔</span>Не удалось загрузить галерею</div>';
  }
}

function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

loadSteam();
</script>
</body>
</html>
